app = "agent-directory-api"
primary_region = "iad"
kill_signal = "SIGINT"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[env]
  DATABASE_URL = "/data/agent_directory.db"
